<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danfun Chat Widget (TEST v2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --brand: #0a64c8;
            --brand-soft: #e8f1fb;
            --brand-soft-strong: #d4e6f7;
            --accent: #f08a3d;
            --bg: #ffffff;
            --bg-soft: #f7f9fc;
            --text: #1a1f2e;
            --text-soft: #5a6478;
            --text-muted: #8b94a6;
            --border: #e8ecf3;
            --border-strong: #d6dce6;
            --shadow-sm: 0 1px 2px rgba(20, 30, 50, 0.04);
            --shadow-md: 0 4px 16px rgba(20, 30, 50, 0.06);
            --shadow-lg: 0 16px 48px rgba(20, 30, 50, 0.12);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            pointer-events: auto;
            color: var(--text);
        }

        /* ============= FLOATING BUTTON ============= */
        #chat-widget-button {
            position: fixed;
            bottom: 22px;
            right: 22px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--brand);
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(10, 100, 200, 0.32);
            transition: transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.18s ease;
            z-index: 2147483648;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #chat-widget-button:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 14px 30px rgba(10, 100, 200, 0.42);
        }
        #chat-widget-button:active { transform: translateY(0) scale(0.98); }
        #chat-widget-button svg { width: 28px; height: 28px; color: white; }

        /* ============= POPUP TEASER ============= */
        #chat-popup-message {
            position: fixed;
            bottom: 96px;
            right: 22px;
            background: var(--bg);
            color: var(--text);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 999;
            max-width: 280px;
            cursor: pointer;
        }
        #chat-popup-message.visible { opacity: 1; transform: translateY(0); }
        #chat-popup-message:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        #chat-popup-close {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0 0 0 4px;
            line-height: 1;
        }
        #chat-popup-close:hover { color: var(--text); }

        /* ============= MAIN CONTAINER ============= */
        #chat-widget-container {
            position: fixed;
            bottom: 100px;
            right: 22px;
            width: 460px;
            max-width: calc(100vw - 44px);
            height: 660px;
            max-height: calc(100vh - 130px);
            background: var(--bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            display: none;
            flex-direction: column;
            z-index: 2147483647;
            overflow: hidden;
            animation: slideUp 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideDown {
            to { opacity: 0; transform: translateY(20px) scale(0.97); }
        }
        #chat-widget-container.closing { animation: slideDown 0.24s ease-out forwards; }

        /* ============= HEADER ============= */
        #chat-widget-header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        #chat-widget-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--brand-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }
        #chat-widget-avatar img { width: 28px; height: 28px; object-fit: contain; }
        #chat-widget-avatar::after {
            content: '';
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border: 2px solid var(--bg);
            border-radius: 50%;
        }
        #chat-widget-titles { flex: 1; min-width: 0; }
        #chat-widget-title-main {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.2;
        }
        #chat-widget-title-sub {
            font-size: 12px;
            color: var(--text-soft);
            line-height: 1.3;
            margin-top: 2px;
        }
        .header-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-soft);
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .header-btn:hover { background: var(--bg-soft); color: var(--text); }
        .header-btn svg { width: 18px; height: 18px; }

        /* ============= DROPDOWN MENU ============= */
        #chat-widget-dropdown {
            position: absolute;
            top: 64px;
            right: 12px;
            background: var(--bg);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            width: 240px;
            overflow: hidden;
            display: none;
            flex-direction: column;
            z-index: 1000;
            animation: fadeIn 0.18s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #chat-widget-dropdown.show { display: flex; }
        .dropdown-item {
            padding: 10px 14px;
            font-size: 13.5px;
            cursor: pointer;
            transition: background 0.12s ease;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dropdown-item svg { width: 16px; height: 16px; color: var(--text-soft); flex-shrink: 0; }
        .dropdown-item:hover { background: var(--bg-soft); }
        .dropdown-section {
            padding: 8px 14px 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
        .previous-chat-item {
            font-size: 13px;
            color: var(--text-soft);
            padding-left: 14px;
        }
        .previous-chat-empty {
            font-size: 12.5px;
            color: var(--text-muted);
            padding: 4px 14px 8px;
            font-style: italic;
        }

        /* ============= BODY ============= */
        #chat-widget-body {
            flex: 1;
            min-height: 0;
            padding: 20px;
            overflow-y: auto;
            background: var(--bg-soft);
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        #chat-widget-body::-webkit-scrollbar { width: 6px; }
        #chat-widget-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
        #chat-widget-body::-webkit-scrollbar-track { background: transparent; }

        /* ============= MESSAGES ============= */
        .message-row {
            display: flex;
            gap: 10px;
            animation: messageIn 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-width: 88%;
        }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--brand-soft);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }
        .message-avatar img { width: 18px; height: 18px; object-fit: contain; }
        .message-bubble {
            padding: 11px 14px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.55;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            word-wrap: break-word;
            border-bottom-left-radius: 4px;
        }
        .message-row.user .message-bubble {
            background: var(--brand);
            color: white;
            border-color: var(--brand);
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: var(--radius-md);
        }
        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            margin: 12px 0 6px;
            font-weight: 600;
            color: inherit;
            font-size: 14.5px;
        }
        .message-bubble ul, .message-bubble ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        .message-bubble li { margin-bottom: 4px; }
        .message-bubble code {
            background: rgba(20, 30, 50, 0.06);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: ui-monospace, 'SF Mono', Monaco, Consolas, monospace;
            font-size: 13px;
        }
        .message-bubble pre {
            background: rgba(20, 30, 50, 0.06);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }
        .message-bubble a { color: var(--brand); text-decoration: underline; text-underline-offset: 2px; }
        .message-row.user .message-bubble a { color: white; }
        .message-bubble strong { font-weight: 600; }
        .message-bubble table {
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 13px;
            width: 100%;
        }
        .message-bubble th, .message-bubble td {
            text-align: left;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
        }
        .message-bubble th { font-weight: 600; color: var(--text-soft); }
        .message-row.user .message-bubble th, .message-row.user .message-bubble td { border-bottom-color: rgba(255,255,255,0.18); }
        .message-row.user .message-bubble th { color: rgba(255,255,255,0.85); }
        .message-bubble p:first-child { margin-top: 0; }
        .message-bubble p:last-child { margin-bottom: 0; }

        /* ============= QUICK QUESTIONS ============= */
        .quick-questions-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 4px 0 4px 38px;
            animation: messageIn 0.32s ease-out;
        }
        .quick-question-btn {
            padding: 7px 13px;
            background: var(--bg);
            border: 1px solid var(--border-strong);
            border-radius: 999px;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.16s ease;
            font-family: inherit;
        }
        .quick-question-btn:hover {
            background: var(--brand-soft);
            border-color: var(--brand);
            color: var(--brand);
            transform: translateY(-1px);
        }

        /* ============= TYPING INDICATOR ============= */
        .typing-bubble {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            background: var(--bg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            border-bottom-left-radius: 4px;
            display: inline-flex;
            gap: 4px;
        }
        .typing-bubble span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingDot 1.3s infinite ease-in-out;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* ============= SEASON / INFO BANNER ============= */
        .season-banner {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--brand-soft);
            color: var(--brand);
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            font-size: 12.5px;
            font-weight: 500;
            border: 1px solid var(--brand-soft-strong);
            margin-bottom: 4px;
        }
        .season-banner svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* ============= FOOTER / INPUT ============= */
        #chat-widget-footer {
            padding: 14px 18px 16px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px 8px 8px 14px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .input-row:focus-within {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(10, 100, 200, 0.12);
        }
        #chat-widget-input {
            flex: 1;
            min-height: 24px;
            max-height: 120px;
            padding: 6px 0;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            background: transparent;
            resize: none;
            color: var(--text);
            line-height: 1.4;
        }
        #chat-widget-input::placeholder { color: var(--text-muted); }
        #chat-widget-send {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--brand);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background 0.15s ease, transform 0.12s ease;
            flex-shrink: 0;
        }
        #chat-widget-send:hover { background: #084ea1; }
        #chat-widget-send:active { transform: scale(0.94); }
        #chat-widget-send:disabled { background: var(--border-strong); cursor: not-allowed; }
        #chat-widget-send svg { width: 16px; height: 16px; }
        .powered-by {
            text-align: center;
            font-size: 10.5px;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.01em;
        }
        .powered-by a { color: var(--text-soft); text-decoration: none; }
        .powered-by a:hover { color: var(--brand); }

        /* ============= MOBILE ============= */
        @media (max-width: 480px) {
            body { display: flex; align-items: center; justify-content: center; }
            #chat-widget-container {
                width: 100vw;
                height: 100vh;
                max-width: 100vw;
                max-height: 100vh;
                bottom: 0;
                right: 0;
                left: 0;
                top: 0;
                border-radius: 0;
                border: none;
            }
            #chat-widget-button { width: 56px; height: 56px; bottom: 16px; right: 16px; }
            #chat-popup-message { right: 16px; bottom: 86px; max-width: calc(100vw - 32px); }
            .message-row { max-width: 92%; }
        }
        @media (min-width: 481px) and (max-width: 768px) {
            #chat-widget-container {
                width: calc(100vw - 32px);
                height: calc(100vh - 110px);
                bottom: 92px;
                right: 16px;
            }
        }
    </style>
</head>

                newChat: "Nieuwe chat starten",
                previous: "Vorige",
                noPrevious: "Geen vorige chats",
                inputPlaceholder: "Typ je bericht...",
                closedBanner: "Buiten seizoen — maart–nov boekbaar",
                errorMessage: "Hmm, er ging iets mis. Opnieuw proberen?",
                rateLimitMessage: "Veel berichten verzonden — even rust, of bel +45 23718083.",
                quickQuestions: ["Prijzen bekijken", "Welke activiteit past bij mij?", "Tijden morgen checken"]
            },
            fr: {
                greeting: "Salut 👋 Envie de vent ? Je peux montrer les prix, vérifier les disponibilités et réserver en moins d'une minute.",
                popupOpen: "Tarif et réservation en 60 secondes 👇",
                popupClosed: "Nous sommes fermés — mais vous pouvez planifier votre visite de printemps ici 👇",
                subtitle: "Activités de plage à Rømø",
                newChat: "Nouvelle conversation",
                previous: "Précédentes",
                noPrevious: "Aucune conversation précédente",
                inputPlaceholder: "Tapez votre message...",
                closedBanner: "Hors saison — réservation mars–nov ouverte",
                errorMessage: "Oups, ça n'a pas fonctionné. On réessaie ?",
                rateLimitMessage: "Beaucoup de messages — attendez un peu, ou appelez +45 23718083.",
                quickQuestions: ["Voir les tarifs", "Quelle activité pour moi ?", "Créneaux demain"]
            },
            es: {
                greeting: "Hola 👋 ¿Listo para el viento? Te muestro precios, miro disponibilidad y reservo en menos de un minuto.",
                popupOpen: "Cotiza y reserva en 60 segundos 👇",
                popupClosed: "Estamos cerrados — puedes planear tu visita de primavera aquí 👇",
                subtitle: "Actividades de playa en Rømø",
                newChat: "Iniciar nuevo chat",
                previous: "Anteriores",
                noPrevious: "Sin chats anteriores",
                inputPlaceholder: "Escribe tu mensaje...",
                closedBanner: "Fuera de temporada — reservas mar–nov abiertas",
                errorMessage: "Algo falló. ¿Probamos otra vez?",
                rateLimitMessage: "Muchos mensajes — un momento, o llama al +45 23718083.",
                quickQuestions: ["Ver precios", "¿Qué actividad me conviene?", "Horarios mañana"]
            }
        };

        function detectLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            const langCode = (browserLang || 'en').split('-')[0].toLowerCase();
            return translations[langCode] ? langCode : 'en';
        }
        const userLanguage = detectLanguage();
        const t = translations[userLanguage];

        function isOpenNow() {
            const parts = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Europe/Copenhagen',
                month: 'numeric', hour: 'numeric', hour12: false
            }).formatToParts(new Date());
            const month = parseInt(parts.find(p => p.type === 'month').value, 10);
            const hour = parseInt(parts.find(p => p.type === 'hour').value, 10);
            return month >= 3 && month <= 11 && hour >= 9 && hour < 18;
        }

        function copenhagenMonth() {
            const parts = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Europe/Copenhagen', month: 'numeric'
            }).formatToParts(new Date());
            return parseInt(parts.find(p => p.type === 'month').value, 10);
        }

        const widget = document.getElementById('chat-widget-container');
        const button = document.getElementById('chat-widget-button');
        const popup = document.getElementById('chat-popup-message');
        const popupSpan = popup.querySelector('span');
        const popupClose = document.getElementById('chat-popup-close');
        const menuBtn = document.getElementById('chat-widget-menu-btn');
        const dropdown = document.getElementById('chat-widget-dropdown');
        const newChatOption = document.getElementById('new-chat-option');
        const previousChatsList = document.getElementById('previous-chats-list');
        const closeBtn = document.getElementById('chat-widget-close');
        const sendBtn = document.getElementById('chat-widget-send');
        const input = document.getElementById('chat-widget-input');
        const body = document.getElementById('chat-widget-body');
        const sendSound = document.getElementById('sendSound');

        let currentSessionId = null;
        const RATE_LIMIT = 30;
        let messageCount = parseInt(sessionStorage.getItem('danfunMsgCount') || '0', 10);

        function applyLanguageStrings() {
            document.documentElement.lang = userLanguage;
            document.querySelector('#chat-widget-title-sub').textContent = t.subtitle;
            document.querySelector('#new-chat-option span').textContent = t.newChat;
            input.placeholder = t.inputPlaceholder;
            popupSpan.textContent = isOpenNow() ? t.popupOpen : t.popupClosed;
        }

        function getCurrentSession() {
            currentSessionId = sessionStorage.getItem('danfunCurrentChatId') ||
                'chat_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);
            sessionStorage.setItem('danfunCurrentChatId', currentSessionId);
            loadConversation(currentSessionId);
            updatePreviousChatsList();
        }

        function loadConversation(sessionId) {
            const saved = sessionStorage.getItem('danfunChat_' + sessionId);
            body.innerHTML = '';
            if (saved) {
                body.innerHTML = saved;
            } else {
                addWelcome();
            }
            checkSeasonBanner();
            requestAnimationFrame(() => { body.scrollTop = body.scrollHeight; });
        }

        function saveConversation() {
            if (currentSessionId) sessionStorage.setItem('danfunChat_' + currentSessionId, body.innerHTML);
        }

        function addWelcome() {
            const welcome = document.createElement('div');
            welcome.className = 'message-row';
            welcome.innerHTML = `
                <div class="message-avatar"><img src="https://www-static.danfun.dk/wp-content/uploads/2025/04/Danfun-logo-blokart.png" alt=""></div>
                <div class="message-bubble">${t.greeting}</div>
            `;
            body.appendChild(welcome);
            const chips = document.createElement('div');
            chips.className = 'quick-questions-container';
            chips.innerHTML = t.quickQuestions
                .map(q => `<button class="quick-question-btn" data-q="${q.replace(/"/g, '&quot;')}">${q}</button>`)
                .join('');
            chips.querySelectorAll('.quick-question-btn').forEach(btn => {
                btn.addEventListener('click', () => sendQuickQuery(btn.dataset.q));
            });
            body.appendChild(chips);
        }

        function checkSeasonBanner() {
            const month = copenhagenMonth();
            if (month < 3 || month > 11) {
                if (!body.querySelector('.season-banner')) {
                    const banner = document.createElement('div');
                    banner.className = 'season-banner';
                    banner.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <span>${t.closedBanner}</span>
                    `;
                    body.insertBefore(banner, body.firstChild);
                }
            }
        }

        function updatePreviousChatsList() {
            previousChatsList.innerHTML = '';
            const keys = Object.keys(sessionStorage)
                .filter(k => k.startsWith('danfunChat_') && k !== 'danfunChat_' + currentSessionId);
            if (keys.length === 0) {
                previousChatsList.innerHTML = `<div class="previous-chat-empty">${t.noPrevious}</div>`;
                return;
            }
            keys.sort((a, b) => b.localeCompare(a));
            keys.forEach(key => {
                const sessionId = key.replace('danfunChat_', '');
                const item = document.createElement('div');
                item.className = 'dropdown-item previous-chat-item';
                item.innerHTML = `<span>${sessionId.replace('chat_', '').slice(0, 12)}…</span>`;
                item.onclick = () => {
                    currentSessionId = sessionId;
                    sessionStorage.setItem('danfunCurrentChatId', currentSessionId);
                    loadConversation(currentSessionId);
                    dropdown.classList.remove('show');
                    updatePreviousChatsList();
                };
                previousChatsList.appendChild(item);
            });
        }

        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        button.onclick = openWidget;
        popup.addEventListener('click', e => { if (e.target !== popupClose) openWidget(); });
        function openWidget() {
            widget.style.display = 'flex';
            button.style.display = 'none';
            popup.classList.remove('visible');
            applyLanguageStrings();
            getCurrentSession();
            setTimeout(() => input.focus(), 250);
            if (window.parent !== window) window.parent.postMessage('danfun-widget-open', '*');
        }

        function closeWidget() {
            saveConversation();
            widget.classList.add('closing');
            setTimeout(() => {
                widget.style.display = 'none';
                widget.classList.remove('closing');
                button.style.display = 'flex';
                setTimeout(() => popup.classList.add('visible'), 1500);
                if (window.parent !== window) window.parent.postMessage('danfun-widget-close', '*');
            }, 240);
        }
        closeBtn.onclick = closeWidget;

        menuBtn.onclick = e => { e.stopPropagation(); dropdown.classList.toggle('show'); };
        document.addEventListener('click', () => dropdown.classList.remove('show'));
        dropdown.onclick = e => e.stopPropagation();

        newChatOption.onclick = () => {
            saveConversation();
            currentSessionId = 'chat_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);
            sessionStorage.setItem('danfunCurrentChatId', currentSessionId);
            messageCount = 0;
            sessionStorage.setItem('danfunMsgCount', '0');
            body.innerHTML = '';
            addWelcome();
            checkSeasonBanner();
            updatePreviousChatsList();
            dropdown.classList.remove('show');
            input.focus();
        };

        popupClose.addEventListener('click', e => { e.stopPropagation(); popup.classList.remove('visible'); });

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;
            messageCount++;
            sessionStorage.setItem('danfunMsgCount', String(messageCount));
            if (messageCount > RATE_LIMIT) {
                input.value = '';
                input.style.height = 'auto';
                addMessage(t.rateLimitMessage, 'bot');
                return;
            }
            addMessage(msg, 'user');
            input.value = '';
            input.style.height = 'auto';
            try { sendSound.currentTime = 0; sendSound.play().catch(() => {}); } catch (e) {}
            const typing = addTypingIndicator();
            try {
                const res = await fetch(window.ChatWidgetConfig.webhook.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId, chatInput: msg, language: userLanguage })
                });
                const data = await res.json();
                typing.remove();
                addMessage(data.output || t.greeting, 'bot');
                saveConversation();
            } catch (err) {
                typing.remove();
                addMessage(t.errorMessage, 'bot');
            }
        }

        function addTypingIndicator() {
            const row = document.createElement('div');
            row.className = 'message-row';
            row.innerHTML = `
                <div class="message-avatar"><img src="https://www-static.danfun.dk/wp-content/uploads/2025/04/Danfun-logo-blokart.png" alt=""></div>
                <div class="typing-bubble"><span></span><span></span><span></span></div>
            `;
            body.appendChild(row);
            body.scrollTop = body.scrollHeight;
            return row;
        }

        function sendQuickQuery(query) {
            input.value = query;
            sendMessage();
        }

        function addMessage(text, type) {
            const row = document.createElement('div');
            row.className = `message-row ${type}`;
            if (type === 'user') {
                row.innerHTML = `<div class="message-bubble"></div>`;
                row.querySelector('.message-bubble').textContent = text;
            } else {
                const html = marked.parse(text, { breaks: true });
                row.innerHTML = `
                    <div class="message-avatar"><img src="https://www-static.danfun.dk/wp-content/uploads/2025/04/Danfun-logo-blokart.png" alt=""></div>
                    <div class="message-bubble">${html}</div>
                `;
                row.querySelectorAll('a').forEach(link => {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener noreferrer');
                });
            }
            body.appendChild(row);
            body.scrollTop = body.scrollHeight;
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.onclick = sendMessage;

        // Initial popup tease (after 3s) — only show before user opens widget
        applyLanguageStrings();
        setTimeout(() => {
            if (widget.style.display !== 'flex') popup.classList.add('visible');
        }, 3000);
    </script>
</body>
</html>
